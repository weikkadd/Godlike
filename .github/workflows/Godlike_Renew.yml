name: Godlike 续期
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  add_time_job:
    name: 运行续期脚本
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests playwright pynacl websockets
          playwright install --with-deps chromium

      - name: 设置代理 (sing-box, 支持所有协议)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.PROXY_NODE }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: 运行续期脚本
        env:
          GODLIKE_1: ${{ secrets.GODLIKE_1 }}
          GODLIKE_2: ${{ secrets.GODLIKE_2 }}   
          GODLIKE_3: ${{ secrets.GODLIKE_3 }}
          GODLIKE_4: ${{ secrets.GODLIKE_4 }}
          GODLIKE_5: ${{ secrets.GODLIKE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        run: python main.py

      - name: 清理历史
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
